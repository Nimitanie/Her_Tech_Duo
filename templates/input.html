<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0; padding: 40px;
            background: url("{{ url_for('static', filename='images/main-bg.jpeg') }}") no-repeat center center/cover;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .scroll-container {
            width: 800px; height: 700px;
            background: url("{{ url_for('static', filename='images/scroll.png') }}") no-repeat center center;
            background-size: 100% 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .content { width: 60%; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #8b5a2b; }
        .btn { padding: 15px 30px; font-family: 'Cinzel'; cursor: pointer; border-radius: 10px; border: none; }
        .submit-btn { background: #2e7d32; color: white; }
    </style>
</head>
<body>
    <audio id="swordSound" src="https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-two/sword_clank_hit_001.mp3"></audio>

    <div class="scroll-container">
        <div class="content">
            <h1 style="font-family: 'Cinzel'; color: #2b1a0a;">Daily Quest</h1>
            <input type="text" id="taskInput" placeholder="Quest Name">
            <select id="priorityInput">
                <option value="High">High</option>
                <option value="Medium" selected>Medium</option>
                <option value="Low">Low</option>
            </select>
            <input type="date" id="deadlineInput">
            <div id="taskList" style="margin-top: 20px; font-weight: bold; color: #5a3b1c;"></div>
        </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 20px;">
        <button class="btn" style="background: #5d4037; color: white;" onclick="addQuest()">Add Quest</button>
        <button class="btn submit-btn" onclick="beginJourney()">Begin Journey ⚔</button>
    </div>

    <script>
        let quests = [];
        function addQuest() {
            const name = document.getElementById("taskInput").value;
            if (!name) return alert("Name thy quest!");
            quests.push({ name: name });
            document.getElementById("taskList").innerHTML += `<div>⚔ ${name}</div>`;
            document.getElementById("taskInput").value = "";
        }

        function beginJourney() {
            if (quests.length === 0) return alert("Add a quest first!");
            document.getElementById("swordSound").play();
            // Save to local storage so dashboard can see it
            localStorage.setItem("realityRPG_quests", JSON.stringify(quests));
            setTimeout(() => {
                window.location.href = "/dashboard"; // Links to the Flask Route
            }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Simulation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        .simulation-bg {
            /* FLASK IMAGE PATH */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("{{ url_for('static', filename='images/main-bg.jpeg') }}") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Playfair Display', serif;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .simulation-container {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #d4ac0d;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 900px;
            width: 90%;
            box-shadow: 0 0 30px rgba(212, 172, 13, 0.3);
        }
        .simulation-title { font-family: 'Cinzel'; font-size: 45px; color: #f9e79f; text-shadow: 0 0 10px gold; }
        .simulation-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .sim-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #d4ac0d;
        }
        .sim-card-title { font-family: 'Cinzel'; font-size: 18px; margin-bottom: 10px; color: #f9e79f; }
        .simulation-button {
            padding: 15px 40px;
            font-family: 'Cinzel';
            background: #1e8449;
            color: white;
            border: 2px solid #27ae60;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .simulation-button:hover { transform: scale(1.05); background: #27ae60; box-shadow: 0 0 15px #27ae60; }
        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>

<body class="simulation-bg">

<div class="simulation-container">
    <div class="simulation-title">Future Simulation</div>
    <div class="simulation-subtitle" style="font-style: italic; opacity: 0.8;">Projecting Your Quest Path...</div>

    <div class="simulation-cards">
        <div class="sim-card">
            <div class="sim-card-title">Predicted Level</div>
            <div id="pred-level" style="font-size: 30px; font-weight: bold;">Lvl 0</div>
            <div id="pred-xp" style="color: #00d4ff;">+0 XP</div>
        </div>

        <div class="sim-card">
            <div class="sim-card-title">Burnout Risk</div>
            <div id="burnout-status" style="font-size: 24px;">Low</div>
        </div>

        <div class="sim-card">
            <div class="sim-card-title">Quest Status</div>
            <div id="task-stats" style="font-size: 16px; text-align: left;">
                Pending: 0<br>Completed: 0
            </div>
        </div>
    </div>

    <div class="sim-card" style="width: 100%; box-sizing: border-box;">
        <div class="sim-card-title">7-Day Performance Trend</div>
        <canvas id="trendChart" height="120"></canvas>
    </div>

    <div class="simulation-button-box" style="margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
        <button class="simulation-button" onclick="runSimulation()">Run Simulation 🔮</button>
        <button class="simulation-button" style="background: #5d4037; border-color: #8b5a2b;" onclick="location.href='/dashboard'">Back to Camp</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let chart;

    function runSimulation() {
        const quests = JSON.parse(localStorage.getItem("realityRPG_quests")) || [];
        const currentXP = parseInt(localStorage.getItem("realityRPG_xp")) || 0;
        
        const completed = quests.filter(q => q.completed).length;
        const pending = quests.filter(q => !q.completed).length;
        // Awarding 20 XP per pending quest for simulation prediction
        const predictedXP = currentXP + (pending * 20);
        
        document.getElementById('pred-level').innerText = `Lvl ${calculateLevel(predictedXP)}`;
        document.getElementById('pred-xp').innerText = `+${pending * 20} XP Possible`;
        document.getElementById('task-stats').innerHTML = `Pending: ${pending}<br>Completed: ${completed}`;
        
        const stress = Math.min(pending * 20, 100);
        const burnout = document.getElementById('burnout-status');
        if(stress > 70) { burnout.innerText = "High ⚠"; burnout.style.color = "red"; }
        else if(stress > 40) { burnout.innerText = "Medium"; burnout.style.color = "orange"; }
        else { burnout.innerText = "Low"; burnout.style.color = "#2ecc71"; }

        renderChart(completed, pending);
    }

    function calculateLevel(xp) {
        if (xp < 100) return 0;
        if (xp < 500) return 1;
        if (xp < 1000) return 2;
        return 2 + Math.floor((xp - 1000) / 1000);
    }

    function renderChart(comp, pend) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Predicted XP Growth',
                    data: [0, comp*5, comp*10, comp*15, comp*20, comp*25, (comp*20) + (pend*20)],
                    borderColor: '#d4ac0d',
                    backgroundColor: 'rgba(212, 172, 13, 0.2)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: 'gold'
                }]
            },
            options: {
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: 'white' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: 'white' }
                    }
                },
                plugins: { 
                    legend: { labels: { color: 'white', font: { family: 'Cinzel' } } } 
                }
            }
        });
    }

    window.onload = runSimulation;
</script>

</body>
</html>

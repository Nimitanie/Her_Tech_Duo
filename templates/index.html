<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealityRPG - Welcome Hero</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            /* Flask Background Image Path */
            background-image: url("{{ url_for('static', filename='images/main-bg.jpeg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .container { position: relative; z-index: 1; }

        /* --- THE ANIMATIONS --- */
        .fade-item {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1.2s ease forwards; /* Shortened slightly for punchiness */
        }

        /* Delays for the "Sequence" effect */
        .title { animation-delay: 0.2s; }
        .divider { animation-delay: 0.6s; }
        .subtitle { animation-delay: 1.0s; }
        .start-btn { animation-delay: 1.4s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 90px;
            font-weight: 700;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #f9e79f, #d4ac0d, #b7950b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
        }

        .divider {
            width: 300px;
            height: 3px;
            margin: 20px auto;
            background: linear-gradient(to right, transparent, gold, transparent);
        }

        .subtitle {
            color: #e0e0e0;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            font-style: italic;
        }

        .start-btn {
            padding: 20px 70px;
            font-size: 24px;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            border: 2px solid #d4ac0d;
            border-radius: 5px;
            cursor: pointer;
            color: #f9e79f;
            background: rgba(20, 90, 50, 0.8);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
        }

        .start-btn:hover {
            transform: scale(1.1);
            background: #1e8449;
            color: white;
            box-shadow: 0 0 25px rgba(212, 172, 13, 0.6);
            border-color: white;
        }

        /* Mobile Optimization */
        @media(max-width:768px){
            .title { font-size: 50px; }
            .subtitle { font-size: 20px; }
            .start-btn { padding: 15px 40px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title fade-item">RealityRPG</h1>
        <div class="divider fade-item"></div>
        <p class="subtitle fade-item">Level Up Your Real Life</p>
        
        <a href="/input" class="start-btn fade-item">
            Start My Journey
        </a>
    </div>

</body>
</html>
